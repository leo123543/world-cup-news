name: Daily World Cup Cards

on:
  schedule:
    - cron: '0 12 * * *'   # 8:00 AM EDT (UTC-4, 夏令时)
    - cron: '0 0 * * *'    # 8:00 PM EDT (UTC-4, 次日 00:00 UTC)
  workflow_dispatch:         # 手动触发用于测试

jobs:
  generate-cards:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Generate cards
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/main.py

      - name: Commit generated cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cards/
          git diff --staged --quiet || git commit -m "chore: daily cards update $(date -u '+%Y-%m-%d %H:%M UTC') [skip ci]"
          git push
